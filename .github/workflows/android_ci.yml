name: Android CI

on:
  workflow_call:
    inputs:
      crate:
        description: "Crate name to build Android package from"
        required: true
        type: string
      release:
        description: "Whether to build a release version"
        required: true
        type: boolean

env:
  CRATE: ${{ inputs.crate }}
  ANDROID_PACKAGE_DIR: packages/android/${{ inputs.crate }}

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.0
          targets: aarch64-linux-android, arm-linux-androideabi, armv7-linux-androideabi, i686-linux-android, thumbv7neon-linux-androideabi, x86_64-linux-android

      - name: Install Cargo-NDK
        run: cargo install cargo-ndk@^3.5

      - name: Install Android ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d

      - name: Build AAR
        run: cargo pkg ${{ env.CRATE }} aar

      - name: Host Test
        working-directory: ${{ env.ANDROID_PACKAGE_DIR }}
        run: ./gradlew test

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install emulator dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-xcb1 libglu1-mesa

      - name: Free Disk Space (Ubuntu)
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true
          remove-large-packages: true

      - name: Android Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          script: ./gradlew connectedAndroidTest
          working-directory: ${{ env.ANDROID_PACKAGE_DIR }}

      - name: Archive Build Output
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CRATE }}.aar
          path: ${{ env.ANDROID_PACKAGE_DIR }}/build/outputs/aar/${{ env.CRATE }}-release.aar

      - name: Build and Publish to Maven Central
        working-directory: ${{ env.ANDROID_PACKAGE_DIR }}
        env:
          GITHUB_TAG: ${{ github.ref_name }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.RSA_GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.RSA_GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.CENTRAL_PASSWORD }}
        run: |
          export VERSION_TAG=${GITHUB_TAG#v}  # Remove the leading 'v'
          echo "Publishing version: $VERSION_TAG"
          echo "Publishing to Maven Central (USER_MANAGED - requires manual release)..."
          ./gradlew publishToMavenCentral
